events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Rate Limiting ──────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=web_limit:10m rate=100r/s;

  # ── Basic Settings ────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ── Gzip Compression ──────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

  # ── SSL (commented out for local dev — uncomment for production with certs) ──
  # server {
  #   listen 443 ssl http2;
  #   server_name guardianai.local;
  #
  #   ssl_certificate     /etc/ssl/certs/guardianai.crt;
  #   ssl_certificate_key /etc/ssl/private/guardianai.key;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   return 301 https://$server_name$request_uri;
  # }

  server {
    listen 80 default_server;
    server_name _;

    # ── Security Headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Frontend Static Files ───────────────────────────
    location / {
      limit_req zone=web_limit burst=20 nodelay;
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── Cache Control for Static Assets ─────────────────
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot|webp|avif)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ── Backend API ─────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=10 nodelay;
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── WebSocket ───────────────────────────────────────
    location /socket.io/ {
      proxy_pass http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 86400s;
    }

    # ── Health endpoint ─────────────────────────────────
    location /health {
      access_log off;
      return 200 "healthy\n";
    }
  }
}
