name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
  workflow_run:
    workflows: [CI]
    branches: [main]
    types:
      - completed

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_SSH_USER: ubuntu
  DEPLOY_DIR: /home/ubuntu/guardianai
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy to EC2
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/guardianai.pem
          chmod 600 ~/.ssh/guardianai.pem
          cat >> ~/.ssh/config <<EOF
          Host guardianai-ec2
            HostName ${{ secrets.EC2_HOST }}
            User ${{ env.AWS_SSH_USER }}
            IdentityFile ~/.ssh/guardianai.pem
            StrictHostKeyChecking no
          EOF

      - name: Copy deployment files
        run: |
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .git \
            --exclude '*.log' \
            ./docker-compose.yml \
            ./nginx.conf \
            ./scripts/ \
            guardianai-ec2:${{ env.DEPLOY_DIR }}/

      - name: Deploy with Docker Compose
        run: |
          ssh guardianai-ec2 << 'EOF'
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Export environment secrets
            export MONGODB_URI="${{ secrets.MONGODB_URI }}"
            export REDIS_URL="${{ secrets.REDIS_URL }}"
            export JWT_ACCESS_SECRET="${{ secrets.JWT_ACCESS_SECRET }}"
            export JWT_REFRESH_SECRET="${{ secrets.JWT_REFRESH_SECRET }}"
            export AI_SERVICE_URL="${{ secrets.AI_SERVICE_URL }}"

            # Pull latest images
            docker compose pull

            # Recreate containers with zero-downtime
            docker compose up -d --remove-orphans --force-recreate

            # Wait for health checks
            echo "Waiting for services to become healthy..."
            sleep 10

            # Clean up unused images and volumes
            docker system prune -af --volumes
          EOF

      - name: Health check
        run: |
          sleep 15
          ssh guardianai-ec2 "curl -sf http://localhost:5000/health || exit 1"
          ssh guardianai-ec2 "curl -sf http://localhost:80 || exit 1"
          echo "Deployment verified successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed. Check EC2 instance ${{ secrets.EC2_HOST }} for details."
